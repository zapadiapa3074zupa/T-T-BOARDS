<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zappa Skate | Boards • Hardware • Shred</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
        body { font-family: 'Anton', sans-serif; }
        .tab-active { border-bottom: 4px solid #000; }
        .cart-circle { width: 52px; height: 52px; transition: 0.3s; }
        @media (max-width: 768px) { .cart-circle { width: 42px; height: 42px; } }
        .modal { backdrop-filter: blur(6px); }
    </style>
</head>
<body class="bg-white text-black"><!-- ================= NAV ================= --><nav class="border-b border-black sticky top-0 bg-white z-50">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-center gap-12 text-2xl">
        <button onclick="switchTab(0)" id="nav0" class="tab-active">HOME</button>
        <button onclick="switchTab(1)" id="nav1">SHOP</button>
        <button onclick="switchTab(2)" id="nav2">SOCIALS</button>
    </div>
</nav><!-- LOGIN BTN --><div class="absolute top-4 right-4">
    <button onclick="openAuth()">LOGIN</button>
</div><!-- ================= HOME ================= --><div id="home" class="max-w-6xl mx-auto px-6 py-12">
    <h1 id="title" class="text-6xl text-center mb-10">ZAPPA SKATE</h1><h2 class="text-3xl mb-4">Latest Video</h2>
<div class="aspect-video bg-black rounded-2xl overflow-hidden">
    <iframe class="w-full h-full" src="https://www.youtube.com/embed/VIDEO_ID"></iframe>
</div>

</div><!-- ================= SHOP ================= --><div id="shop" class="hidden max-w-6xl mx-auto px-6 py-12"><div class="flex gap-8 border-b border-black mb-6">
    <button onclick="shopTab(0)" id="sb0" class="tab-active text-3xl">BOARDS</button>
    <button onclick="shopTab(1)" id="sb1" class="text-3xl">HARDWARE</button>
</div>

<div id="boards"></div>
<div id="hardware" class="hidden"></div>

<!-- SETUP BAR -->
<div class="bg-black text-white p-6 rounded-3xl mt-10">
    <p>BOARD: <span id="selB">None</span></p>
    <p>HARDWARE: <span id="selH">None</span></p>
    <p>TOTAL: $<span id="total">0</span></p>
    <button onclick="addToCart()" class="bg-white text-black px-4 py-2 mt-4">ADD TO CART</button>
    <button onclick="checkout()" class="bg-white text-black px-4 py-2 mt-4">PAY (SOON)</button>
</div>

</div><!-- ================= SOCIALS ================= --><div id="socials" class="hidden text-center p-10">
    <p>YouTube: <span id="yt"></span></p>
    <p>Instagram: <span id="ig"></span></p>
    <p>Facebook: <span id="fb"></span></p>
    <p>TikTok: <span id="tt"></span></p>
</div><!-- ================= CART ================= --><button onclick="toggleCart()" class="fixed bottom-5 right-5 bg-black text-white w-14 h-14 rounded-full">🛒</button>

<div id="cart" class="hidden fixed right-0 top-0 w-80 h-full bg-white border-l border-black p-4">
    <h2 class="text-3xl">CART</h2>
    <div id="cartItems"></div>
</div><!-- ================= AUTH ================= --><div id="auth" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center modal">
    <div class="bg-white p-6 w-80">
        <h2 class="text-2xl">LOGIN / SIGNUP</h2>
        <input id="email" placeholder="email" class="border w-full p-2 mb-2">
        <input id="password" placeholder="password" type="password" class="border w-full p-2 mb-2">
        <input id="username" placeholder="username" class="border w-full p-2 mb-2">
        <button onclick="auth()" class="bg-black text-white w-full py-2">ENTER</button>
    </div>
</div><!-- ================= ADMIN ================= --><div id="admin" class="hidden fixed inset-0 bg-black text-white p-10 overflow-auto">
    <h2 class="text-4xl">ADMIN PANEL</h2><h3>Site</h3>
<input id="editTitle" class="text-black p-2 mb-2" placeholder="Title">
<input id="editYT" class="text-black p-2 mb-2" placeholder="YouTube">

<h3>Socials</h3>
<input id="editIG" class="text-black p-2 mb-2" placeholder="Instagram">
<input id="editFB" class="text-black p-2 mb-2" placeholder="Facebook">
<input id="editTT" class="text-black p-2 mb-2" placeholder="TikTok">

<h3>Boards</h3>
<div id="aBoards"></div>

<h3>Hardware</h3>
<div id="aHardware"></div>

<button onclick="saveAdmin()" class="bg-white text-black px-4 py-2 mt-4">SAVE</button>
<button onclick="previewAdmin()" class="bg-white text-black px-4 py-2 mt-4">PREVIEW</button>

</div><script>

let user=null;
let admin=false;
let cart=[];
let boardSel=null;
let hardwareSel=[];

let site={title:"ZAPPA SKATE",yt:"user",ig:"user",fb:"user",tt:"user"};

let users=JSON.parse(localStorage.getItem("users")||"[]");

let boards=[
 {name:"Flame Deck",price:60,img:"https://picsum.photos/300"},
 {name:"Skull Deck",price:55,img:"https://picsum.photos/301"}
];

let hardware=[
 {name:"Trucks",price:30,img:""},
 {name:"Wheels",price:25,img:""}
];

function switchTab(t){
 document.getElementById("home").classList.add("hidden");
 document.getElementById("shop").classList.add("hidden");
 document.getElementById("socials").classList.add("hidden");
 if(t==0)document.getElementById("home").classList.remove("hidden");
 if(t==1)document.getElementById("shop").classList.remove("hidden");
 if(t==2)document.getElementById("socials").classList.remove("hidden");
}

function shopTab(t){
 document.getElementById("boards").classList.toggle("hidden",t!==0);
 document.getElementById("hardware").classList.toggle("hidden",t!==1);
}

function render(){
 let b=document.getElementById("boards");
 b.innerHTML="";
 boards.forEach((x,i)=>{
  b.innerHTML+=`<div onclick=selB(${i}) class='border p-2 mb-2'>${x.name} $${x.price}</div>`;
 });

 let h=document.getElementById("hardware");
 h.innerHTML="";
 hardware.forEach((x,i)=>{
  h.innerHTML+=`<div onclick=selH(${i}) class='border p-2 mb-2'>${x.name} $${x.price}</div>`;
 });
}

function selB(i){boardSel=boards[i];update();}
function selH(i){hardwareSel.push(hardware[i]);update();}

function update(){
 document.getElementById("selB").innerText=boardSel?boardSel.name:"None";
 document.getElementById("selH").innerText=hardwareSel.map(h=>h.name).join(",")||"None";
 let t=(boardSel?boardSel.price:0)+hardwareSel.reduce((a,b)=>a+b.price,0);
 document.getElementById("total").innerText=t;
}

function addToCart(){cart.push({boardSel,hardwareSel});alert("added");}
function checkout(){alert("Payment soon");}

function toggleCart(){document.getElementById("cart").classList.toggle("hidden");}

function openAuth(){document.getElementById("auth").classList.remove("hidden");}

function auth(){
 let u={email:email.value,pass:password.value,name:username.value};
 users.push(u);
 localStorage.setItem("users",JSON.stringify(users));
 user=u;
 if(u.name=="zappa.admin"){admin=true;openAdmin();}
 document.getElementById("auth").classList.add("hidden");
}

function openAdmin(){document.getElementById("admin").classList.remove("hidden");loadAdmin();}

function loadAdmin(){
 document.getElementById("editTitle").value=site.title;
 document.getElementById("editYT").value=site.yt;
 document.getElementById("editIG").value=site.ig;
 document.getElementById("editFB").value=site.fb;
 document.getElementById("editTT").value=site.tt;

 let aB=document.getElementById("aBoards");aB.innerHTML="";
 boards.forEach((b,i)=>{
  aB.innerHTML+=`<input value='${b.name}' onchange='boards[${i}].name=this.value'><input value='${b.price}' onchange='boards[${i}].price=+this.value'><input value='${b.img}' onchange='boards[${i}].img=this.value'><br>`;
 });

 let aH=document.getElementById("aHardware");aH.innerHTML="";
 hardware.forEach((h,i)=>{
  aH.innerHTML+=`<input value='${h.name}' onchange='hardware[${i}].name=this.value'><input value='${h.price}' onchange='hardware[${i}].price=+this.value'><input value='${h.img}' onchange='hardware[${i}].img=this.value'><br>`;
 });
}

function saveAdmin(){
 site.title=editTitle.value;
 site.yt=editYT.value;
 site.ig=editIG.value;
 site.fb=editFB.value;
 site.tt=editTT.value;

 document.getElementById("title").innerText=site.title;
 document.getElementById("yt").innerText=site.yt;
 document.getElementById("ig").innerText=site.ig;
 document.getElementById("fb").innerText=site.fb;
 document.getElementById("tt").innerText=site.tt;

 document.getElementById("admin").classList.add("hidden");
}

function previewAdmin(){alert("preview mode (live already)");}

render();
</script></body>
</html>
