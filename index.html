<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Through & Through</title>
<style>
body { margin:0; font-family: Arial; background:#000; color:#fff; }
header { text-align:center; padding:20px; }
nav { display:flex; justify-content:center; gap:30px; margin-bottom:20px; }
button { cursor:pointer; }
.card { border:1px solid #fff; padding:10px; margin:10px; }
.selected { background:#fff; color:#000; }
#cartPanel { position:fixed; right:0; top:0; width:300px; height:100%; background:#fff; color:#000; padding:10px; display:none; }
#loginModal { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; justify-content:center; align-items:center; }
#loginBox { background:#fff; color:#000; padding:20px; }
.admin { border:1px solid #fff; padding:10px; margin:10px; }
</style>
</head>
<body><header>
<h1 id="title">THROUGH & THROUGH</h1>
<p id="subtitle">built for riders</p>
</header><nav>
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('shop')">Shop</button>
<button onclick="showTab('socials')">Socials</button>
</nav><div id="loginArea" style="position:absolute; top:10px; right:10px;"></div><!-- HOME --><div id="home">
<h2 style="text-align:center;">Ride Everything</h2>
<p style="text-align:center; opacity:0.6;">Content coming soon</p>
</div><!-- SHOP --><div id="shop" style="display:none;">
<div>
<button onclick="shopTab='boards';renderShop()">Boards</button>
<button onclick="shopTab='hardware';renderShop()">Hardware</button>
</div>
<div id="shopContent"></div>
<button onclick="addToCart()">Add To Cart</button>
</div><!-- SOCIALS --><div id="socials" style="display:none; text-align:center;">
<div id="socialList"></div>
</div><!-- CART --><button onclick="toggleCart()" style="position:fixed;bottom:10px;right:10px;">🛒</button>

<div id="cartPanel"></div><!-- LOGIN --><div id="loginModal">
<div id="loginBox">
<input id="email" placeholder="email"><br>
<input id="username" placeholder="username"><br>
<button onclick="login()">login</button>
</div>
</div><!-- ADMIN --><div id="adminPanel" class="admin" style="display:none;"></div><script>
let tab='home';
let shopTab='boards';
let cart=[];
let user=null;
let admin=false;
let selectedBoard=null;
let selectedHardware=null;

let site={title:'THROUGH & THROUGH',subtitle:'built for riders',footer:'website made by zappa',socials:{youtube:'user',instagram:'user',facebook:'user',tiktok:'user'}};

let boards=[{name:'Flame Deck',price:60},{name:'Street Skull',price:55}];
let hardware=[{name:'Basic',price:20},{name:'Pro',price:35}];

function save(){
localStorage.setItem('cart',JSON.stringify(cart));
localStorage.setItem('user',JSON.stringify(user));
localStorage.setItem('boards',JSON.stringify(boards));
localStorage.setItem('hardware',JSON.stringify(hardware));
localStorage.setItem('site',JSON.stringify(site));
}

function load(){
cart=JSON.parse(localStorage.getItem('cart')||'[]');
user=JSON.parse(localStorage.getItem('user')||'null');
boards=JSON.parse(localStorage.getItem('boards')||JSON.stringify(boards));
hardware=JSON.parse(localStorage.getItem('hardware')||JSON.stringify(hardware));
site=JSON.parse(localStorage.getItem('site')||JSON.stringify(site));
if(user && user.username==='zappa.admin') admin=true;
}

function showTab(t){
tab=t;
document.getElementById('home').style.display=t==='home'?'block':'none';
document.getElementById('shop').style.display=t==='shop'?'block':'none';
document.getElementById('socials').style.display=t==='socials'?'block':'none';
render();
}

function render(){
document.getElementById('title').innerText=site.title;
document.getElementById('subtitle').innerText=site.subtitle;

let loginArea=document.getElementById('loginArea');
loginArea.innerHTML=user? user.username+' <button onclick="logout()">logout</button>' : '<button onclick="openLogin()">login</button>';

renderShop();
renderCart();
renderSocials();
if(admin) renderAdmin();
}

function renderShop(){
let el=document.getElementById('shopContent');
el.innerHTML='';

if(shopTab==='boards'){
boards.forEach((b,i)=>{
let d=document.createElement('div');
d.className='card'+(selectedBoard===i?' selected':'');
d.innerHTML=b.name+' $'+b.price+' <button onclick="selectBoard('+i+')">select</button>';
el.appendChild(d);
});
}

if(shopTab==='hardware'){
hardware.forEach((h,i)=>{
let d=document.createElement('div');
d.className='card'+(selectedHardware===i?' selected':'');
d.innerHTML=h.name+' $'+h.price+' <button onclick="selectHardware('+i+')">select</button>';
el.appendChild(d);
});
}
}

function selectBoard(i){selectedBoard=i;render();}
function selectHardware(i){selectedHardware=i;render();}

function addToCart(){
if(selectedBoard===null) return alert('select board');
let item={
name:boards[selectedBoard].name+(selectedHardware!==null?' + '+hardware[selectedHardware].name:''),
price:boards[selectedBoard].price+(selectedHardware!==null?hardware[selectedHardware].price:0)
};
cart.push(item);
save();
render();
}

function renderCart(){
let el=document.getElementById('cartPanel');
el.innerHTML='<h3>Cart</h3>';
let total=0;
cart.forEach((c,i)=>{
total+=c.price;
el.innerHTML+=c.name+' $'+c.price+' <button onclick="removeItem('+i+')">x</button><br>';
});
el.innerHTML+='<b>Total: $'+total+'</b><br><button onclick="clearCart()">clear</button>';
}

function removeItem(i){cart.splice(i,1);save();render();}
function clearCart(){cart=[];save();render();}

function toggleCart(){
let el=document.getElementById('cartPanel');
el.style.display=el.style.display==='block'?'none':'block';
}

function openLogin(){document.getElementById('loginModal').style.display='flex';}

function login(){
user={email:document.getElementById('email').value,username:document.getElementById('username').value};
if(user.username==='zappa.admin') admin=true;
document.getElementById('loginModal').style.display='none';
save();render();
}

function logout(){user=null;admin=false;save();render();}

function renderSocials(){
let el=document.getElementById('socialList');
el.innerHTML='';
Object.keys(site.socials).forEach(k=>{
el.innerHTML+=k+': '+site.socials[k]+'<br>';
});
}

function renderAdmin(){
let el=document.getElementById('adminPanel');
el.style.display='block';
el.innerHTML='<h3>Admin</h3>';

el.innerHTML+='Title:<input value="'+site.title+'" onchange="site.title=this.value;save();render()"><br>';
el.innerHTML+='Subtitle:<input value="'+site.subtitle+'" onchange="site.subtitle=this.value;save();render()"><br>';

el.innerHTML+='<h4>Boards</h4>';
boards.forEach((b,i)=>{
el.innerHTML+=`<input value="${b.name}" onchange="boards[${i}].name=this.value;save();render()">
<input type='number' value="${b.price}" onchange="boards[${i}].price=+this.value;save();render()">
<button onclick="boards.splice(${i},1);save();render()">x</button><br>`;
});
el.innerHTML+='<button onclick="boards.push({name:\'new\',price:50});save();render()">+ add</button>';

el.innerHTML+='<h4>Hardware</h4>';
hardware.forEach((h,i)=>{
el.innerHTML+=`<input value="${h.name}" onchange="hardware[${i}].name=this.value;save();render()">
<input type='number' value="${h.price}" onchange="hardware[${i}].price=+this.value;save();render()">
<button onclick="hardware.splice(${i},1);save();render()">x</button><br>`;
});
el.innerHTML+='<button onclick="hardware.push({name:\'new\',price:25});save();render()">+ add</button>';
}

load();
render();
</script></body>
</html>
