<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skate Shop</title>
<style>
body { margin:0; font-family:Arial; background:white; }
.nav { display:flex; justify-content:center; gap:40px; padding:20px; font-size:20px; }
.nav div { cursor:pointer; }
.section { display:none; padding:20px; }
.active { display:block; }
.shop-tabs { display:flex; gap:20px; margin-bottom:20px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
button { padding:10px; margin:5px; cursor:pointer; }
#cartBtn {
position:fixed; bottom:20px; right:20px;
border-radius:50%; width:50px; height:50px;
background:black; color:white; display:none;
}
#cartPopup {
position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
background:white; border:1px solid black; padding:20px; display:none;
}
.footer { text-align:center; margin-top:40px; padding:20px; }
</style>
</head>
<body><div class="nav">
<div onclick="show('home')">Home</div>
<div onclick="show('shop')">Shop</div>
<div onclick="show('socials')">Socials</div>
</div><div id="home" class="section active">
<h2>Latest Content</h2>
<p>YouTube: user</p>
<p>Instagram: user</p>
<p>Facebook: user</p>
<p>TikTok: user</p>
</div><div id="shop" class="section">
<div class="shop-tabs">
<button onclick="showShop('boards')">Boards</button>
<button onclick="showShop('hardware')">Hardware</button>
</div><div id="boards" class="shop-content">
<div class="card">
<h3>Classic Deck</h3>
<p>$50</p>
<button onclick="selectBoard('Classic Deck',50)">Select</button>
</div>
</div><div id="hardware" class="shop-content" style="display:none;">
<div class="card">
<h3>Basic Hardware</h3>
<p>$20</p>
<button onclick="addHardware('Basic Hardware',20)">Add</button>
</div>
</div><button onclick="checkout()">Proceed to Checkout</button>

</div><div id="socials" class="section">
<h2>Socials</h2>
<p><a href="#">YouTube - user</a></p>
<p><a href="#">Instagram - user</a></p>
<p><a href="#">Facebook - user</a></p>
<p><a href="#">TikTok - user</a></p>
</div><button id="cartBtn" onclick="toggleCart()">🛒</button>

<div id="cartPopup">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p id="total"></p>
<button onclick="checkout()">Checkout</button>
</div><div class="footer">
<p>Website made by Zappa | Business owned by Aiden Young</p>
</div><script>
let cart = [];

function show(section) {
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(section).classList.add('active');
}

function showShop(tab) {
document.querySelectorAll('.shop-content').forEach(s=>s.style.display='none');
document.getElementById(tab).style.display='block';
}

function selectBoard(name, price) {
cart.push({name, price});
updateCart();
}

function addHardware(name, price) {
cart.push({name, price});
updateCart();
}

function updateCart() {
document.getElementById('cartBtn').style.display='block';
let list = document.getElementById('cartItems');
list.innerHTML='';
let total = 0;
cart.forEach(item=>{
let li = document.createElement('li');
li.textContent = item.name + ' - $' + item.price;
list.appendChild(li);
total += item.price;
});
document.getElementById('total').textContent = 'Total: $' + total;
}

function toggleCart() {
let popup = document.getElementById('cartPopup');
popup.style.display = popup.style.display==='block'?'none':'block';
}

function checkout() {
alert('Checkout not available yet');
}
</script></body>
</html>
