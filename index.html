<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Through & Through</title>
<style>body{ margin:0; font-family:Arial,Helvetica,sans-serif; background:#000; color:#fff; }

header{ text-align:center; padding:25px 10px; }

h1{ font-size:52px; letter-spacing:6px; margin:0; }

nav{ display:flex; justify-content:center; gap:35px; margin:10px 0 20px; }

nav button{ background:none; border:none; color:#fff; font-size:16px; cursor:pointer; }

nav button:hover{ text-decoration:underline; }

.container{ max-width:1100px; margin:auto; padding:10px; }

/* PRODUCT LIST (SELL AUTH STYLE) */ .product{ display:flex; align-items:center; gap:12px; border:1px solid #fff; border-radius:10px; padding:10px; margin:10px 0; cursor:pointer; transition:0.2s; }

.product:hover{ background:#111; }

.product img{ width:65px; height:65px; object-fit:cover; border-radius:8px; }

.product-info{ display:flex; flex-direction:column; flex:1; }

.small{ opacity:0.7; }

.btn{ background:#fff; color:#000; border:none; padding:6px 10px; cursor:pointer; margin-top:5px; border-radius:5px; }

/* CART */ #cartBtn{ position:fixed; bottom:15px; right:15px; width:55px; height:55px; border-radius:50%; background:#fff; border:none; font-size:18px; cursor:pointer; }

#cartPanel{ position:fixed; right:0; top:0; width:320px; height:100%; background:#fff; color:#000; display:none; padding:10px; overflow:auto; }

/* MODAL */ #modal{ position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; }

#modalBox{ background:#fff; color:#000; padding:20px; width:320px; border-radius:10px; }

/* LOGIN */ #loginBox{ position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; justify-content:center; align-items:center; }

#loginInner{ background:#fff; color:#000; padding:20px; width:280px; border-radius:10px; }

input{ display:block; width:100%; margin:6px 0; padding:6px; }

/* ADMIN */ .admin{ border:1px solid #fff; margin:10px; padding:10px; }

.admin-section{ margin-top:10px; }

</style>
</head>
<body><header>
<h1 id="title">THROUGH & THROUGH</h1>
<div class="small" id="subtitle">built for riders</div>
</header><nav>
<button onclick="setTab('home')">Home</button>
<button onclick="setTab('shop')">Shop</button>
<button onclick="setTab('socials')">Socials</button>
</nav><!-- LOGIN BUTTON --><div style="position:absolute;top:10px;right:10px">
<button onclick="openLogin()">Login</button>
</div><div class="container"><!-- HOME --><div id="home">
<div class="product">
<div class="product-info">
<b>Latest Drops</b>
<div class="small">videos, posts, skate clips coming soon</div>
</div>
</div>
</div><!-- SHOP --><div id="shop" style="display:none"><div style="display:flex;gap:10px;margin-bottom:10px">
<button onclick="shopTab='boards';renderShop()">Boards</button>
<button onclick="shopTab='hardware';renderShop()">Hardware</button>
</div><div id="shopArea"></div></div><!-- SOCIALS --><div id="socials" style="display:none">
<div class="product">
<div class="product-info" id="socialArea"></div>
</div>
</div></div><!-- CART --><button id="cartBtn" onclick="toggleCart()">🛒</button>

<div id="cartPanel"></div><!-- MODAL PRODUCT --><div id="modal" onclick="closeModal(event)">
  <div id="modalBox"></div>
</div><!-- LOGIN --><div id="loginBox">
  <div id="loginInner">
    <h3>Login / Sign Up</h3>
    <input id="email" placeholder="email" />
    <input id="password" placeholder="password" />
    <input id="username" placeholder="username" />
    <button onclick="login()">Enter</button>
  </div>
</div><!-- ADMIN --><div id="adminPanel" class="admin" style="display:none"></div><script>

let tab='home';
let shopTab='boards';
let cart=[];
let user=null;
let admin=false;
let selected=null;

let site={
  title:'THROUGH & THROUGH',
  subtitle:'built for riders',
  footer:'website made by zappa | business owned by aiden young',
  socials:{youtube:'user',instagram:'user',tiktok:'user',facebook:'user'}
};

let boards=[
  {name:'Flame Deck',price:60,img:'https://via.placeholder.com/150'},
  {name:'Skull Deck',price:55,img:'https://via.placeholder.com/150'}
];

let hardware=[
  {name:'Basic Trucks',price:20,img:'https://via.placeholder.com/150'},
  {name:'Pro Trucks',price:35,img:'https://via.placeholder.com/150'}
];

function setTab(t){
  tab=t;
  document.getElementById('home').style.display=t==='home'?'block':'none';
  document.getElementById('shop').style.display=t==='shop'?'block':'none';
  document.getElementById('socials').style.display=t==='socials'?'block':'none';
  renderShop();
}

function renderShop(){
  let list=document.getElementById('shopArea');
  list.innerHTML='';

  let items=shopTab==='boards'?boards:hardware;

  items.forEach((p,i)=>{
    list.innerHTML+=`
      <div class='product' onclick='openProduct("${shopTab}",${i})'>
        <img src='${p.img||"https://via.placeholder.com/150"}' />
        <div class='product-info'>
          <b>${p.name}</b>
          <div>$${p.price}</div>
        </div>
      </div>
    `;
  });
}

function openProduct(type,i){
  let item=type==='boards'?boards[i]:hardware[i];
  selected=item;

  document.getElementById('modalBox').innerHTML=`
    <h3>${item.name}</h3>
    <img src='${item.img||"https://via.placeholder.com/150"}' style='width:100%;border-radius:8px'/>
    <p>Price: $${item.price}</p>
    <button onclick='addToCart()'>Add to Cart</button>
    <button onclick='payNow()'>Pay Now</button>
  `;

  document.getElementById('modal').style.display='flex';
}

function closeModal(e){
  if(e.target.id==='modal') document.getElementById('modal').style.display='none';
}

function addToCart(){
  cart.push(selected);
  alert('Added to cart');
}

function payNow(){
  alert('Payment soon - not released yet');
}

function toggleCart(){
  let c=document.getElementById('cartPanel');
  c.style.display=c.style.display==='block'?'none':'block';
  renderCart();
}

function renderCart(){
  let c=document.getElementById('cartPanel');
  let total=0;
  c.innerHTML='<h3>Cart</h3>';

  cart.forEach((i,idx)=>{
    total+=i.price;
    c.innerHTML+=`${i.name} $${i.price} <button onclick='removeItem(${idx})'>x</button><br>`;
  });

  c.innerHTML+=`<hr>Total: $${total}<br><button onclick='payNow()'>Pay Now</button>`;
}

function removeItem(i){cart.splice(i,1);renderCart();}

function openLogin(){document.getElementById('loginBox').style.display='flex';}

function login(){
  user={email:email.value,password:password.value,username:username.value};
  if(user.username==='zappa.admin')admin=true;
  document.getElementById('loginBox').style.display='none';
  renderAdmin();
}

function renderAdmin(){
  if(!admin)return;
  let a=document.getElementById('adminPanel');
  a.style.display='block';
  a.innerHTML='<h3>Admin Panel</h3>';

  a.innerHTML+='<h4>Boards</h4>';
  boards.forEach((b,i)=>{
    a.innerHTML+=`<input value='${b.name}' onchange="boards[${i}].name=this.value"><input value='${b.price}' onchange="boards[${i}].price=+this.value"><input value='${b.img}' onchange="boards[${i}].img=this.value"><br>`;
  });

  a.innerHTML+='<h4>Hardware</h4>';
  hardware.forEach((h,i)=>{
    a.innerHTML+=`<input value='${h.name}' onchange="hardware[${i}].name=this.value"><input value='${h.price}' onchange="hardware[${i}].price=+this.value"><input value='${h.img}' onchange="hardware[${i}].img=this.value"><br>`;
  });
}

renderShop();

</script></body>
</html>
