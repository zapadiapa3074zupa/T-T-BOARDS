<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skate Shop</title>
<style>
body { margin:0; font-family:Arial; background:white; }.nav { display:flex; justify-content:center; gap:40px; padding:20px; } .nav button { background:none; border:none; font-size:18px; font-weight:bold; cursor:pointer; }

.section { display:none; padding:20px; } .active { display:block; }

.shop-tabs { margin-top:40px; margin-left:20%; }

.product { border:1px solid #ccc; padding:15px; margin:10px; display:inline-block; cursor:pointer; }

.cart-btn { position:fixed; bottom:20px; right:20px; width:55px; height:55px; border-radius:50%; background:black; color:white; display:none; align-items:center; justify-content:center; font-weight:bold; cursor:pointer; }

.footer { margin-top:60px; text-align:center; font-size:16px; } </style>

</head>
<body><div class="nav">
  <button onclick="showSection('home')">Home</button>
  <button onclick="showSection('shop')">Shop</button>
  <button onclick="showSection('socials')">Socials</button>
</div><div id="home" class="section active">
  <h2>Latest Content</h2>
  <p>YouTube</p>
  <iframe width="300" height="200" src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  <p>Instagram | Facebook | TikTok feeds coming here</p>
</div><div id="shop" class="section">
  <div class="shop-tabs">
    <button onclick="showShopTab('boards')">Boards</button>
    <button onclick="showShopTab('hardware')">Hardware</button>
  </div>  <div id="boards" class="shop-content">
    <div class="product" onclick="selectBoard('Classic Deck', 50)">Classic Deck - $50</div>
    <div class="product" onclick="selectBoard('Pro Deck', 80)">Pro Deck - $80</div>
  </div>  <div id="hardware" class="shop-content" style="display:none;">
    <div class="product" onclick="addHardware('Trucks', 30)">Trucks - $30</div>
    <div class="product" onclick="addHardware('Wheels', 25)">Wheels - $25</div>
  </div>  <div id="actions" style="margin-top:20px; display:none;">
    <button onclick="addToCart()">Add to Cart</button>
    <button onclick="checkout()">Proceed to Checkout</button>
  </div>
</div><div id="socials" class="section">
  <h2>Social Links</h2>
  <p><a href="#">User YouTube</a></p>
  <p><a href="#">User Instagram</a></p>
  <p><a href="#">User Facebook</a></p>
  <p><a href="#">User TikTok</a></p>
</div><div class="cart-btn" id="cartBtn" onclick="openCart()">🛒</div><div class="footer">
  Website made by zappa<br>
  Business owned by Aiden Young
</div><script>
let cart = [];
let selectedBoard = null;
let selectedHardware = [];

function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showShopTab(tab) {
  document.getElementById('boards').style.display = tab==='boards'?'block':'none';
  document.getElementById('hardware').style.display = tab==='hardware'?'block':'none';
}

function selectBoard(name, price) {
  selectedBoard = {name, price};
  document.getElementById('actions').style.display = 'block';
}

function addHardware(name, price) {
  selectedHardware.push({name, price});
  document.getElementById('actions').style.display = 'block';
}

function addToCart() {
  if (!selectedBoard) return alert('Select a board first');

  let total = selectedBoard.price;
  selectedHardware.forEach(h => total += h.price);

  cart.push({
    board: selectedBoard,
    hardware: [...selectedHardware],
    total
  });

  document.getElementById('cartBtn').style.display = 'flex';
  alert('Added to cart');

  selectedBoard = null;
  selectedHardware = [];
}

function checkout() {
  alert('Checkout not available yet');
}

function openCart() {
  if (cart.length === 0) return alert('Cart empty');

  let total = 0;
  let msg = '';

  cart.forEach((item, i) => {
    msg += `Item ${i+1}: ${item.board.name} + ${item.hardware.map(h=>h.name).join(', ')} = $${item.total}\n`;
    total += item.total;
  });

  msg += `\nTotal: $${total}`;
  alert(msg);
}
</script></body>
</html>
